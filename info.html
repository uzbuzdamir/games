<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Play - Spin the Bottle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #141019;
            --card-bg: #211b27;
            --accent-color: #00adb5;
            --text-color: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .wheel-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
        }
        #bottle {
            width: 100%;
            height: 100%;
            font-size: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.3, 1);
            transform-origin: center center;
        }
        .result-box {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 4px 10px rgba(0, 173, 181, 0.3);
        }
        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <h1>🍾 Spin the Bottle</h1>

    <div class="wheel-container">
        <div id="bottle">🍾</div>
    </div>

    <div class="result-box" id="result">
        Shishani aylantiring va topshiriqni bajaring! 👇
    </div>

    <button class="btn" onclick="spinBottle()">Aylantirish 🔄</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentRotation = 0;
        const tasks = [
            "😜 Shart: Chap tomondagi o'yinchining sochini buzing!",
            "🔥 Vazifa: Imtihondan faqat 5 baho olishga va'da bering!",
            "🤫 Sir: Hayotingizdagi eng qiziqarli sirni aytib bering.",
            "🎯 Shart: Telefoningizdagi eng oxirgi rasmni hammaga ko'rsating!",
            "🎤 Vazifa: Mikrofonni olib bitta qo'shiq kuylab bering!",
            "🤝 Shart: O'ng tomondagi o'yinchi bilan qo'l berib ko'rishing."
        ];

        function spinBottle() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

            document.getElementById('result').innerText = "Shisha aylanmoqda... 🔄";

            // Kamida 3 marta to'liq aylanib tasodifiy gradusda to'xtaydi
            const extraDegrees = Math.floor(Math.random() * 360);
            currentRotation += 1080 + extraDegrees;

            const bottle = document.getElementById('bottle');
            bottle.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
                document.getElementById('result').innerText = randomTask;
            }, 3000); // 3 soniyadan keyin animatsiya tugaydi
        }
    </script>
</body>
</html>
