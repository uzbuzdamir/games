<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Global Play - Guruhli Mafiya Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0d0e15;
            --panel-bg: #161824;
            --mafia-red: #ff3333;
            --civil-blue: #00adb5;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            font-size: 20px;
            color: var(--mafia-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 5px 0;
            text-align: center;
        }

        .phase-banner {
            background: #ffbc00;
            color: #000;
            font-weight: bold;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255,188,0,0.2);
        }

        /* 10 ta o'yinchi ro'yxati paneli */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 15px;
        }

        .player-card {
            background: var(--panel-bg);
            border-left: 4px solid #555;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .player-card.alive { border-left-color: #28a745; }
        .player-card.dead { background: #222; opacity: 0.5; border-left-color: #444; text-decoration: line-through; }
        .player-card.mafia-team { border-left-color: var(--mafia-red); background: #24181a; }
        .player-card.civil-team { border-left-color: var(--civil-blue); background: #142229; }
        .player-card.selected { border: 1px solid #ffbc00; background: #2c2514 !important; }

        /* Jonli o'yin chati loglari */
        .chat-log {
            background: #08090d;
            border: 1px solid #1f2335;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            max-width: 360px;
            height: 140px;
            overflow-y: auto;
            box-sizing: border-box;
            font-size: 12px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .chat-msg { margin-bottom: 6px; }
        .chat-msg .name { font-weight: bold; color: #ffbc00; }
        .chat-msg.system { color: #888; font-style: italic; }

        .action-box {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .btn {
            background: var(--mafia-red);
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>🕵️ Mafiya Pro (10 O'yinchi)</h1>
    <div class="phase-banner" id="game-phase">O'yin boshlanishini kutilmoqda</div>

    <!-- O'YINCHILAR RO'YXATI -->
    <div class="players-grid" id="players-list"></div>

    <!-- CHAT TIZIMI -->
    <div class="chat-log" id="chat-box"></div>

    <!-- HARAKATLAR TUGMASI -->
    <div class="action-box" id="action-area">
        <button class="btn" onclick="setupGame()">O'yinni Boshlash (Rollarni taqsimlash) 🎭</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if(tg) tg.expand();

        let gameState = {
            phase: "START", // START, NIGHT_MAFIA, NIGHT_SPECIAL, DAY_TALK, DAY_VOTE
            myRole: "",
            myIndex: 0,
            players: [],
            selectedTarget: null,
            killedTonight: null,
            checkedTonight: null
        };

        const botNames = [
            "Shaxob", "Sardor", "Malika", "Jasur",
            "Diyor", "Laylo", "Kamron", "Anvar", "Bekzod"
        ];

        function addLog(sender, text, isSystem = false) {
            const chatBox = document.getElementById('chat-box');
            if (isSystem) {
                chatBox.innerHTML += `<div class="chat-msg system">⚙️ ${text}</div>`;
            } else {
                chatBox.innerHTML += `<div class="chat-msg"><span class="name">${sender}:</span> ${text}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 1. O'YINNI BOSHIDAN STRATEGIK SOZLASH
        function setupGame() {
            if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            // 10 ta o'yinchini shakllantirish (Index 0 — Haqiqiy foydalanuvchi)
            gameState.players = [{ name: "Siz (Dasturchi)", isBot: false, isAlive: true, role: "", faction: "" }];

            for (let i = 0; i < 9; i++) {
                gameState.players.push({
                    name: botNames[i],
                    isBot: true,
                    isAlive: true,
                    role: "",
                    faction: ""
                });
            }

            // Rollarni taqsimlash algoritmi (3 ta Mafiya, 1 ta Komissar, 1 ta Doktor, 5 ta Fuqaro)
            let rolesPool = ["Mafiya", "Mafiya", "Mafiya", "Komissar", "Doktor", "Fuqaro", "Fuqaro", "Fuqaro", "Fuqaro", "Fuqaro"];
            rolesPool = rolesPool.sort(() => Math.random() - 0.5);

            gameState.players.forEach((p, idx) => {
                p.role = rolesPool[idx];
                p.faction = (p.role === "Mafiya") ? "RED" : "BLUE";
            });

            gameState.myRole = gameState.players[0].role;

            addLog("", `O'yin boshlandi! Sizga berilgan rol: **${gameState.myRole}**`, true);
            if (gameState.myRole === "Mafiya") {
                addLog("Tizim", "🔴 Siz QIZILLAR (Mafiya) jamoasidansiz. Maqsad: Ko'klarni yo'q qilish!", true);
            } else {
                addLog("Tizim", "🔵 Siz KO'KLAR (Aholi) jamoasidansiz. Maqsad: Mafiyani fosh qilish!", true);
            }

            renderPlayers();
            startNightPhase();
        }

        function renderPlayers() {
            const listEl = document.getElementById('players-list');
            listEl.innerHTML = "";

            gameState.players.forEach((p, idx) => {
                let cardClass = "player-card " + (p.isAlive ? "alive" : "dead");

                // Agar foydalanuvchi Mafiya bo'lsa, sheriklarini qizil ko'radi
                if (gameState.myRole === "Mafiya" && p.faction === "RED" && p.isAlive) {
                    cardClass += " mafia-team";
                }
                // O'zining kartasi ko'k bo'lib ajralib turadi (Agar aholi bo'lsa)
                if (idx === 0 && gameState.myRole !== "Mafiya") {
                    cardClass += " civil-team";
                }
                if (gameState.selectedTarget === idx) {
                    cardClass += " selected";
                }

                let roleTag = (idx === 0) ? `(${p.role})` : '';
                // Agar o'lgan bo'lsa rolini hamma ko'radi
                if (!p.isAlive) roleTag = `[${p.role}]`;

                listEl.innerHTML += `
                    <div class="${cardClass}" onclick="selectPlayer(${idx})">
                        <span>${idx + 1}. ${p.name} ${roleTag}</span>
                        <span>${p.isAlive ? '❤️' : '💀'}</span>
                    </div>
                `;
            });
        }

        function selectPlayer(idx) {
            if (!gameState.players[idx].isAlive || idx === 0) return;
            if (gameState.phase !== "NIGHT_MAFIA" && gameState.phase !== "NIGHT_SPECIAL" && gameState.phase !== "DAY_VOTE") return;

            gameState.selectedTarget = idx;
            renderPlayers();

            // Harakat tugmasini aktivlashtirish
            const actionArea = document.getElementById('action-area');
            if (gameState.phase === "NIGHT_MAFIA" && gameState.myRole === "Mafiya") {
                actionArea.innerHTML = `<button class="btn" onclick="confirmMafiaVote()">Hukmni Tasdiqlash 🔫</button>`;
            } else if (gameState.phase === "NIGHT_SPECIAL" && gameState.myRole === "Komissar") {
                actionArea.innerHTML = `<button class="btn" style="background:#00adb5;" onclick="confirmKomissarCheck()">Tekshirish 🔍</button>`;
            } else if (gameState.phase === "DAY_VOTE") {
                actionArea.innerHTML = `<button class="btn" style="background:#ffbc00; color:#000;" onclick="confirmDayVote()">Ovoz berish 🗳</button>`;
            }
        }

        // 2. TUN FAZASI
        function startNightPhase() {
            gameState.phase = "NIGHT_MAFIA";
            gameState.selectedTarget = null;
            document.body.style.backgroundColor = "#06070d";
            document.getElementById('game-phase').innerText = "🌃 TUN (Mafiya uyg'onadi)";
            addLog("Tizim", "Shahar uyquga ketdi. Mafiya a'zolari qurbonni tanlamoqda...", true);

            const actionArea = document.getElementById('action-area');

            if (gameState.myRole === "Mafiya") {
                actionArea.innerHTML = `<p>Otish uchun bitta ko'k o'yinchini tanlang:</p>`;
            } else {
                // Agar foydalanuvchi aholi bo'lsa, bot mafiyalar o'zaro tasodifiy qaror qabul qiladi
                setTimeout(() => {
                    let targets = gameState.players.map((p, i) => (p.faction === "BLUE" && p.isAlive) ? i : null).filter(v => v !== null);
                    gameState.killedTonight = targets[Math.floor(Math.random() * targets.length)];
                    addLog("Tizim", "Kechasi o'q ovozi eshitildi...", true);
                    startSpecialNightPhase();
                }, 2000);
            }
        }

        function confirmMafiaVote() {
            gameState.killedTonight = gameState.selectedTarget;
            addLog("Mafiya Jamoasi", `Biz ${gameState.players[gameState.killedTonight].name}ni yo'q qilishga qaror qildik.`, false);
            startSpecialNightPhase();
        }

        // 3. KOMISSAR VA DOKTOR FAZASI
        function startSpecialNightPhase() {
            gameState.phase = "NIGHT_SPECIAL";
            gameState.selectedTarget = null;
            document.getElementById('game-phase').innerText = "🕵️ TUN (Komissar va Doktor vaqti)";
            renderPlayers();

            const actionArea = document.getElementById('action-area');

            if (gameState.myRole === "Komissar" && gameState.players[0].isAlive) {
                actionArea.innerHTML = `<p>Rolini bilmoqchi bo'lgan gumonlanuvchini tanlang:</p>`;
            } else {
                // Komissar bot bo'lsa avtomat tekshiradi
                setTimeout(() => {
                    goToDayPhase();
                }, 2000);
            }
        }

        function confirmKomissarCheck() {
            let target = gameState.selectedTarget;
            let roleResult = gameState.players[target].faction === "RED" ? "🔴 MAFIYA!" : "🔵 Tinch aholi.";
            alert(`Tekshirish natijasi: ${gameState.players[target].name} — ${roleResult}`);
            goToDayPhase();
        }

        // 4. KUNDUZGI CHAT VA SIZNING ADMIN INTERFEYSINGIZ
        function goToDayPhase() {
            gameState.phase = "DAY_TALK";
            document.body.style.backgroundColor = "#0d0e15";
            document.getElementById('game-phase').innerText = "☀️ KUNDUZ (Muhokama)";

            // Kechasi o'ldirilgan odamni hisobdan chiqarish
            let killedIdx = gameState.killedTonight;
            if (killedIdx !== null && gameState.players[killedIdx].isAlive) {
                gameState.players[killedIdx].isAlive = false;
                addLog("Tong otdi", `🚨 Mudhish xabar! Kechasi ${gameState.players[killedIdx].name} shafqatsizlarcha o'ldirildi!`, true);
            } else {
                addLog("Tong otdi", "🌙 Bu kecha hech kim o'lmadi, shifokor hammani saqlab qoldi!", true);
            }

            renderPlayers();

            if (checkGameOver()) return;

            // Botlar o'zaro chatda tortishadi
            addLog("Tizim", "Kunlik muhokama boshlandi. O'yinchilar o'z shubhalarini yozishmoqda...", true);

            setTimeout(() => { addLog(botNames[0], "Meningcha 3-o'yinchi juda shubhali harakat qilyapti!"); }, 1000);
            setTimeout(() => { addLog(botNames[2], "Yo'q, men kechasi o'q ovozini o'ng tomondan eshitdim."); }, 2500);
            setTimeout(() => {
                addLog("Tizim", "Muhokama tugadi. Ovoz berish bosqichiga o'tamiz!", true);
                startVotingPhase();
            }, 4500);
        }

        // 5. OVOZ BERISH BOSQICHI
        function startVotingPhase() {
            gameState.phase = "DAY_VOTE";
            gameState.selectedTarget = null;
            document.getElementById('game-phase').innerText = "🗳 OVOZ BERISH VAQTI";
            renderPlayers();

            const actionArea = document.getElementById('action-area');
            actionArea.innerHTML = `<p>Sizningcha kim mafiya? Ovoz berish uchun ro'yxatdan tanlang:</p>`;
        }

        function confirmDayVote() {
            if(tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
            let myVote = gameState.selectedTarget;

            // Botlarning ovozlarini generatsiya qilish (Tasodifiy tirik odamga ovoz berishadi)
            let aliveIndices = gameState.players.map((p, i) => p.isAlive ? i : null).filter(v => v !== null);
            let votesCount = Array(10).fill(0);

            // Sizning ovozingiz
            votesCount[myVote]++;

            // Botlar ovozi
            aliveIndices.forEach(idx => {
                if (idx !== 0) { // O'zingizdan tashqari botlar ovoz beradi
                    let randomVote = aliveIndices[Math.floor(Math.random() * aliveIndices.length)];
                    votesCount[randomVote]++;
                }
            });

            // Eng ko'p ovoz olganini aniqlash
            let maxVotes = 0;
            let exiledIdx = null;
            votesCount.forEach((count, i) => {
                if (count > maxVotes) {
                    maxVotes = count;
                    exiledIdx = i;
                }
            });

            addLog("Ovoz berish yakunlandi", `${gameState.players[exiledIdx].name} eng ko'p ovoz topladi (${maxVotes} ta ovoz) va shahardan haydaldi!`, true);
            gameState.players[exiledIdx].isAlive = false;

            addLog("Tizim", `${gameState.players[exiledIdx].name}ning roli aslida **${gameState.players[exiledIdx].role}** edi.`, true);

            renderPlayers();

            if (checkGameOver()) return;

            // Keyingi tunga o'tish
            setTimeout(() => {
                startNightPhase();
            }, 3000);
        }

        // O'YIN TUGASH SHARTLARINI TEKSHIRISH
        function checkGameOver() {
            let aliveMafia = gameState.players.filter(p => p.faction === "RED" && p.isAlive).length;
            let aliveCivils = gameState.players.filter(p => p.faction === "BLUE" && p.isAlive).length;

            if (aliveMafia === 0) {
                document.getElementById('game-phase').innerText = "🔵 KO'KLAR YUTDI! 🎉";
                document.getElementById('action-area').innerHTML = `<button class="btn" style="background:#28a745;" onclick="location.reload()">Qayta o'ynash 🔄</button>`;
                addLog("O'yin tugadi", "🎉 Tabriklaymiz! Barcha mafiyalar yo'q qilindi, Ko'klar (Tinch aholi) jamoasi g'alaba qozondi!", true);
                return true;
            }
            if (aliveMafia >= aliveCivils) {
                document.getElementById('game-phase').innerText = "🔴 QIZILLAR YUTDI! 🕶";
                document.getElementById('action-area').innerHTML = `<button class="btn" style="background:#28a745;" onclick="location.reload()">Qayta o'ynash 🔄</button>`;
                addLog("O'yin tugadi", "🕶 Mafiya (Qizillar) jamoasi shaharni to'liq nazoratga oldi. Qizillar g'alaba qozondi!", true);
                return true;
            }
            return false;
        }
    </script>
</body>
</html>
